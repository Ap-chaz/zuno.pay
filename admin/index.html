<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Sign In — ZUNO</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="assets/zuno.png?v=3">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-auth-body">

<a class="skip-link" href="#main-content">Skip to content</a>

<main id="main-content" class="auth-shell">

  <div class="auth-card">
    <img class="auth-logo" src="assets/zuno.png?v=3" alt="ZUNO">
    <span class="badge auth-badge">ADMIN</span>
    <h1 class="auth-title">Sign in</h1>
    <p class="auth-subtitle">Manage your waitlist from one place.</p>

    <form id="loginForm" novalidate>
      <label class="sr-only" for="email">Email address</label>
      <input id="email" type="email" name="email" placeholder="Enter your email address" autocomplete="username" required>

      <label class="sr-only" for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>

      <button type="submit" class="join-btn" id="loginBtn">Sign in →</button>

      <p class="form-feedback" id="loginFeedback" role="status" aria-live="polite"></p>
    </form>

    <p class="dev-hint" id="devHint" hidden></p>
  </div>

</main>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
